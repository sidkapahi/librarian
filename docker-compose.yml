version: "3.8"

services:
  curatarr:
    image: fallsoldier/curatarr:latest
    container_name: curatarr
    restart: unless-stopped
    environment:
      # ── Required ──────────────────────────────────────────
      - DISCORD_TOKEN=
      - DISCORD_CLIENT_ID=
      - BOOKSHELF_URL=http://bookshelf:8787
      - BOOKSHELF_API_KEY=

      # ── Optional ──────────────────────────────────────────
      - DISCORD_GUILD_ID=
      - ADMIN_USER_ID=
      - ADMIN_ROLE_ID=
      - REQUEST_CHANNEL_ID=
      - QUALITY_PROFILE_NAME=Spoken
      - METADATA_PROFILE_NAME=None
      - REQUIRE_APPROVAL=false
      - LOG_FILE=/config/curatarr.log
      - TZ=UTC

    volumes:
      - /mnt/user/appdata/curatarr:/config

    networks:
      - your_docker_network

networks:
  your_docker_network:
    external: true
